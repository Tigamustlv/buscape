<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscapé</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, Arial, sans-serif;
}

body{
    background:#f5f7fa;
}

header{
    background:#0d6efd;
    color:white;
    height:70px;
    display:flex;
    align-items:center;
    padding:0 40px;
    font-size:24px;
    font-weight:600;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}

.container{
    width:95%;
    max-width:1200px;
    margin:40px auto;
}

.card{
    background:white;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
    padding:30px;
}

h2{
    margin-bottom:20px;
    color:#333;
}

.pesquisa{
    display:flex;
    gap:15px;
    align-items:center;
}

input{
    flex:1;
    padding:14px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

input:focus{
    outline:none;
    border-color:#0d6efd;
}

button{
    padding:14px 28px;
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    transition:.3s;
}

button:hover{
    background:#0b5ed7;
}

.info{
    margin-top:12px;
    color:#777;
    font-size:14px;
}

#resultadoInfo{
    margin-top:15px;
    font-weight:600;
    color:#333;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

thead{
    background:#0d6efd;
    color:white;
}

th,td{
    padding:14px;
    text-align:left;
    border-bottom:1px solid #e5e5e5;
}

tbody tr:hover{
    background:#f4f8ff;
}

.semResultado{
    text-align:center;
    color:#777;
    padding:30px;
}

.loading{
    text-align:center;
    padding:20px;
    color:#666;
}

.badge{
    display:inline-block;
    background:#0d6efd;
    color:white;
    padding:4px 10px;
    border-radius:20px;
    font-size:12px;
    margin-left:8px;
}

</style>
</head>

<body>

<header>
    Buscapé
</header>

<div class="container">

    <div class="card">

        <h2>Consultar Cliente</h2>

        <div class="pesquisa">

            <input
                id="pesquisa"
                type="text"
                placeholder="Digite CPF, nome, empresa ou contrato..."
                onkeydown="if(event.key==='Enter') buscar()"
            >

            <button onclick="buscar()">🔍 Pesquisar</button>

        </div>

        <div class="info">
            Exemplos: João Silva • 12345678900 • Empresa 1 • 548796
        </div>

        <!-- RESULTADO INFO -->
        <div id="resultadoInfo"></div>

        <table>

            <thead>
                <tr>
                    <th>Contrato</th>
                    <th>Cliente</th>
                    <th>Empresa</th>
                    <th>Documento</th>
                    <th>Cessão</th>
                </tr>
            </thead>

            <tbody id="resultado">

                <tr>
                    <td colspan="5" class="semResultado">
                        Nenhuma pesquisa realizada.
                    </td>
                </tr>

            </tbody>

        </table>

    </div>

</div>

<script>

async function buscar(){

    const valor = document.getElementById("pesquisa").value.trim();
    const tbody = document.getElementById("resultado");
    const info = document.getElementById("resultadoInfo");

    if(valor === ""){
        document.title = "Buscapé";
        alert("Digite um valor para pesquisar.");
        return;
    }

    tbody.innerHTML = `
        <tr>
            <td colspan="5" class="loading">Buscando...</td>
        </tr>
    `;

    info.innerHTML = "";

    try {

        const response = await fetch(`http://127.0.0.1:8000/buscar?q=${encodeURIComponent(valor)}`);
        const data = await response.json();

        // 🔥 TEXTO DE RESULTADO
        info.innerHTML = `
            ${data.length} resultado(s) encontrados para "<b>${valor}</b>"
        `;

        // 🔥 TÍTULO DINÂMICO
        document.title = `Buscapé | ${data.length} resultados`;

        if(data.length === 0){

            info.innerHTML = `
                Nenhum resultado encontrado para "<b>${valor}</b>"
            `;

            tbody.innerHTML = `
                <tr>
                    <td colspan="5" class="semResultado">
                        Nenhum resultado encontrado.
                    </td>
                </tr>
            `;
            return;
        }

        tbody.innerHTML = "";

        data.forEach(item => {
            tbody.innerHTML += `
                <tr>
                    <td>${item.contrato}</td>
                    <td>${item.cliente}</td>
                    <td>${item.originador}</td>
                    <td>${item.documento}</td>
                    <td>${item.cessao}</td>
                </tr>
            `;
        });

    } catch (error) {

        document.title = "Buscapé | Erro";

        info.innerHTML = `Erro ao realizar consulta`;

        tbody.innerHTML = `
            <tr>
                <td colspan="5" class="semResultado">
                    Erro ao conectar com o servidor
                </td>
            </tr>
        `;

        console.error(error);
    }
}

</script>

</body>
</html>
