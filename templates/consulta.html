<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta - Buscapé</title>

<link rel="icon" type="image/x-icon" href="{{ url_for('static', path='images/icon.ico') }}">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, Arial, sans-serif;
}

body{
    background:#f5f7fa;
}

header{
    background:#0d6efd;
    color:white;
    height:70px;
    display:flex;
    align-items:center;
    padding:0 40px;
    font-size:24px;
    font-weight:600;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}

.container{
    width:95%;
    max-width:1200px;
    margin:40px auto;
}

.card{
    background:white;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
    padding:30px;
}

h2{
    margin-bottom:20px;
    color:#333;
}

.pesquisa{
    display:flex;
    gap:15px;
    align-items:center;
}

input{
    flex:1;
    padding:14px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

input:focus{
    outline:none;
    border-color:#0d6efd;
}

button{
    padding:14px 28px;
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    transition:.3s;
}




button.btnpag{
    padding: 10px 12px;
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    transition:.3s;
}

button:hover{
    background:#0b5ed7;
}

.info{
    margin-top:12px;
    color:#777;
    font-size:14px;
}

#resultadoInfo{
    margin-top:15px;
    font-weight:600;
    color:#333;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

thead{
    background:#0d6efd;
    color:white;
}

th,td{
    padding:14px;
    text-align:left;
    border-bottom:1px solid #e5e5e5;
}

tbody tr:hover{
    background:#f4f8ff;
}

.semResultado{
    text-align:center;
    color:#777;
    padding:30px;
}

.loading{
    text-align:center;
    padding:20px;
    color:#666;
}

    
</style>


</head>


<body>


    <button onclick="window.location.href='/'"
style="
    position:fixed;
    top:15px;
    right:15px;
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#6c757d;
    color:white;
    cursor:pointer;
    z-index:999;
">
Home
</button>


<header>Consulta Buscapé</header>

<div class="container">

<div class="card">

<h2>Consultar Cliente</h2>

<div class="pesquisa">
<input id="pesquisa" placeholder="Digite algo..." onkeydown="if(event.key==='Enter') buscar(1)">
<button onclick="buscar(1)">🔍 Pesquisar</button>
<button class="btnpag" onclick="baixarExcel()">⬇ Exportar Excel</button>
</div>

<div id="resultadoInfo"></div>

<table>
<thead>
<tr>
<th>Originador</th>
<th>Fundo</th>
<th>Operação</th>
<th>Cessão</th>
<th>CCB</th>
<th>Documento</th>
<th>Nome</th>
</tr>
</thead>

<tbody id="resultado">
<tr>
<td colspan="7" class="semResultado">Nenhuma pesquisa realizada.</td>
</tr>
</tbody>
</table>

<div class="paginacao">
<button class="btnpag" onclick="anterior()">⬅</button>
<span id="paginaInfo"></span>
<button class="btnpag" onclick="proxima()">➡</button>
</div>

</div>
</div>

<script>

let paginaAtual = 1;
const limit = 1000;
let ultimoQuery = "";
let totalRegistros = 0;

async function buscar(pagina = 1){

    const valor = document.getElementById("pesquisa").value.trim();
    const tbody = document.getElementById("resultado");
    const info = document.getElementById("resultadoInfo");

    if(valor === ""){
        alert("Digite algo");
        return;
    }

    paginaAtual = pagina;
    ultimoQuery = valor;

    const offset = (pagina - 1) * limit;

    tbody.innerHTML = `<tr><td colspan="7">Buscando...</td></tr>`;

    const response = await fetch(
        `http://127.0.0.1:8000/buscar?q=${encodeURIComponent(valor)}&limit=${limit}&offset=${offset}`
    );

    const res = await response.json();

    const data = res.data;
    totalRegistros = res.total;

    const totalPaginas = Math.ceil(totalRegistros / limit);

    document.getElementById("paginaInfo").innerText =
        `Página ${paginaAtual} de ${totalPaginas}`;

    info.innerHTML =
        `${totalRegistros} resultados encontrados`;

    let html = "";

    data.forEach(item => {
        html += `
            <tr>
                <td>${item.originador ?? ''}</td>
                <td>${item.fundo ?? ''}</td>
                <td>${item.operacao ?? ''}</td>
                <td>${item.cessao ?? ''}</td>
                <td>${item.ccb ?? ''}</td>
                <td>${item.documento ?? ''}</td>
                <td>${item.nome ?? ''}</td>
            </tr>
        `;
    });

    tbody.innerHTML = html;
}

function anterior(){
    if(paginaAtual > 1){
        buscar(paginaAtual - 1);
    }
}

function proxima(){
    const totalPaginas = Math.ceil(totalRegistros / limit);
    if(paginaAtual < totalPaginas){
        buscar(paginaAtual + 1);
    }
}



function baixarExcel(){

    const valor = document.getElementById("pesquisa").value.trim();

    if(valor === ""){
        alert("Faça uma busca primeiro");
        return;
    }

    window.open(
        `http://127.0.0.1:8000/exportar?q=${encodeURIComponent(valor)}`,
        "_blank"
    );
}


</script>

</body>
</html>
