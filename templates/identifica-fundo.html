<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Identificar Fundo - Buscapé</title>

<link rel="icon" type="image/x-icon" href="{{ url_for('static', path='images/icon.ico') }}">


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, Arial, sans-serif;
}


body{
    background:#f5f7fa;
}



header{

    background:#0d6efd;
    color:white;

    height:70px;

    display:flex;
    align-items:center;

    padding:0 40px;

    font-size:24px;
    font-weight:600;

    box-shadow:0 2px 10px rgba(0,0,0,.15);

}



.home{

    position:fixed;
    top:15px;
    right:15px;

    padding:10px 15px;

    border:none;
    border-radius:8px;

    background:#6c757d;
    color:white;

    cursor:pointer;

    z-index:999;

}




.container{

    width:95%;
    max-width:1200px;

    margin:40px auto;

}




.card{

    background:white;

    border-radius:10px;

    box-shadow:0 5px 15px rgba(0,0,0,.08);

    padding:30px;

}



h2{

    margin-bottom:20px;

    color:#333;

}



.upload-area{


    border:2px dashed #ccc;

    border-radius:10px;

    padding:50px;

    text-align:center;

    cursor:pointer;

    transition:.3s;

}



.upload-area:hover{

    border-color:#0d6efd;

    background:#f4f8ff;

}




.upload-area.drag{

    background:#eef5ff;

    border-color:#0d6efd;

}




button{


    padding:14px 28px;

    background:#0d6efd;

    color:white;

    border:none;

    border-radius:8px;

    cursor:pointer;

    font-size:16px;

    transition:.3s;

}



button:hover{

    background:#0b5ed7;

}




.btn-secondary{

    background:#6c757d;

}


.btn-success{

    background:#198754;

}


.btn-success:disabled{

    opacity:.5;

    cursor:not-allowed;

}



.info{

    margin-top:15px;

    color:#555;

}




table{

    width:100%;

    margin-top:20px;

    border-collapse:collapse;

}



thead{

    background:#0d6efd;

    color:white;

}



th,td{

    padding:14px;

    text-align:left;

    border-bottom:1px solid #e5e5e5;

}



tbody tr:hover{

    background:#f4f8ff;

}



.semResultado{

    text-align:center;

    color:#777;

    padding:30px;

}



</style>


</head>



<body>



<button class="home"
onclick="window.location.href='/'">

Home

</button>



<header>
Identificar Fundo - Buscapé
</header>




<div class="container">


<div class="card">


<h2>
📊 Identificar Fundo
</h2>



<p>

Envie uma planilha contendo:

<br>

<b>CPF, CCB e ORIGEM</b>

<br>

O sistema irá identificar o fundo e gerar uma nova planilha.

</p>




<br>



<div 
id="dropZone"
class="upload-area">


<h1>
⬆️
</h1>


<h3>
Arraste a planilha aqui
</h3>


<p>
ou clique para selecionar
</p>



<button onclick="abrirArquivo()">

Escolher planilha

</button>



<div class="info" id="fileInfo"></div>



</div>



<input 
type="file"
id="arquivo"
accept=".xlsx,.xls"
style="display:none">





<br>



<button
class="btn-success"
id="exportar"
disabled>

⬇ Exportar Resultado

</button>



<div 
id="resultadoInfo"
class="info">

</div>





<table>


<thead>

<tr>

<th>CPF</th>

<th>CCB</th>

<th>ORIGEM</th>


</tr>

</thead>



<tbody id="resultado">

<tr>

<td colspan="4" class="semResultado">

Nenhum arquivo processado.

</td>

</tr>


</tbody>


</table>



</div>


</div>







<script>


const input =
document.getElementById("arquivo");


const drop =
document.getElementById("dropZone");


const info =
document.getElementById("fileInfo");


const tabela =
document.getElementById("resultado");


const exportar =
document.getElementById("exportar");



let arquivoResultado = null;




function abrirArquivo(){

    input.click();

}




input.onchange = function(){

    enviarArquivo(
        input.files[0]
    );

}




drop.onclick = function(){

    input.click();

}




drop.addEventListener(
"dragover",
function(e){

    e.preventDefault();

    drop.classList.add("drag");

});



drop.addEventListener(
"dragleave",
function(){

    drop.classList.remove("drag");

});




drop.addEventListener(
"drop",
function(e){

    e.preventDefault();

    drop.classList.remove("drag");


    enviarArquivo(
        e.dataTransfer.files[0]
    );

});







async function enviarArquivo(file){


    if(!file)
        return;



    if(!file.name.match(
        /\.(xlsx|xls)$/i
    )){

        alert(
            "Selecione uma planilha Excel"
        );

        return;

    }



    info.innerHTML =
    "Processando: " + file.name;




    let form =
    new FormData();



    form.append(
        "file",
        file
    );



    let response =
    await fetch(
        "/identificar-fundo",
        {
            method:"POST",
            body:form
        }
    );



    let data =
    await response.json();




    if(!response.ok){

        alert(
            data.detail
        );

        return;

    }




    arquivoResultado =
    data.arquivo;



    exportar.disabled =
    false;



    info.innerHTML =
    "Arquivo processado com sucesso";



    document.getElementById(
        "resultadoInfo"
    ).innerHTML =

    `
    ${data.total_linhas} linhas processadas |
    ${data.fundos_encontrados} fundos encontrados
    `;



    montarTabela(
        data.data
    );


}







function montarTabela(dados){


    tabela.innerHTML="";


    dados.slice(0,100)
    .forEach(
    item=>{


        tabela.innerHTML +=

        `

        <tr>

        <td>${item.CPF ?? ""}</td>

        <td>${item.CCB ?? ""}</td>

        <td>${item.ORIGEM ?? ""}</td>


        </tr>

        `;


    });


}






exportar.onclick=function(){


    if(!arquivoResultado)
        return;



    window.open(

        "/baixar-resultado/"
        + arquivoResultado,

        "_blank"

    );


}




</script>



</body>

</html>
